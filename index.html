<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Lock Box</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif;
        }
        
        .sinhala {
            font-family: 'Noto Sans Sinhala', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-shadow {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        .btn-ad {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-ad:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }
        
        .btn-ad:disabled {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            cursor: not-allowed;
            opacity: 1;
        }
        
        .btn-watch {
            background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-watch.active {
            background: linear-gradient(135deg, #4ade80 0%, #16a34a 100%);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .btn-watch.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(22, 163, 74, 0.5);
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
            }
            50% {
                box-shadow: 0 0 35px rgba(34, 197, 94, 0.7);
            }
        }
        
        .progress-bar {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .lock-icon {
            transition: all 0.4s ease;
        }
        
        .lock-icon.unlocked {
            color: #22c55e;
            transform: scale(1.2) rotate(10deg);
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .check-animation {
            animation: checkPop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes checkPop {
            0% {
                transform: scale(0);
            }
            70% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-md sm:max-w-lg">
        <div class="bg-white rounded-3xl card-shadow p-6 sm:p-8 fade-in">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 mb-4">
                    <i id="lockIcon" class="fas fa-lock text-white text-3xl lock-icon"></i>
                </div>
                <h1 class="sinhala text-2xl sm:text-3xl font-bold text-gray-800 mb-2">
                    Video එක බලන්න Ads 2 Click කරන්න
                </h1>
                <p class="text-gray-500 text-sm sm:text-base">
                    Click both ads below to unlock the video
                </p>
            </div>

            <!-- Progress Bar -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-600">Progress</span>
                    <span class="text-sm font-bold text-purple-600">
                        <span id="progressText">0</span>/2 Ads
                    </span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                    <div id="progressBar" class="progress-bar h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- Ad Buttons -->
            <div class="space-y-4 mb-6">
                <button 
                    id="ad1Btn" 
                    class="btn-ad w-full py-4 px-6 rounded-2xl text-white font-semibold text-base sm:text-lg shadow-lg flex items-center justify-center gap-3"
                    onclick="clickAd(1)"
                >
                    <i class="fas fa-external-link-alt"></i>
                    <span>Open Ad 1</span>
                </button>

                <button 
                    id="ad2Btn" 
                    class="btn-ad w-full py-4 px-6 rounded-2xl text-white font-semibold text-base sm:text-lg shadow-lg flex items-center justify-center gap-3"
                    onclick="clickAd(2)"
                >
                    <i class="fas fa-external-link-alt"></i>
                    <span>Open Ad 2</span>
                </button>
            </div>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500 font-medium">Then</span>
                </div>
            </div>

            <!-- Watch Video Button -->
            <button 
                id="watchBtn" 
                class="btn-watch w-full py-5 px-6 rounded-2xl text-white font-bold text-lg sm:text-xl shadow-xl flex items-center justify-center gap-3 disabled:cursor-not-allowed disabled:opacity-60"
                disabled
                onclick="watchVideo()"
            >
                <i class="fas fa-play-circle text-2xl"></i>
                <span id="watchBtnText">Open Drive Link</span>
            </button>

            <!-- Footer Info -->
            <div id="statusMessage" class="mt-6 text-center">
                <p class="text-sm text-gray-500 flex items-center justify-center gap-2">
                    <i class="fas fa-info-circle"></i>
                    <span>Complete both steps to unlock</span>
                </p>
            </div>
        </div>

        <!-- Terms Notice -->
        <div class="mt-6 text-center">
            <p class="text-white text-xs sm:text-sm opacity-80">
                By clicking ads you support our content creators
            </p>
        </div>
    </div>

    <script>
        // CONFIG: Ad links and Drive video link
        const adLink1 = "https://assistedtogether.com/qedxsf81?key=764b1ac5ea80b60f371b71e20dbdc29d"; 
        const adLink2 = "https://assistedtogether.com/g3zdm4s2gt?key=2c538152257d0b736350db4a7266231d"; 
        const driveVideoLink = "https://drive.google.com/file/d/your_file_id/view"; // Replace with your Google Drive Link

        // State management
        let ad1Clicked = false;
        let ad2Clicked = false;

        // DOM Elements
        const ad1Btn = document.getElementById('ad1Btn');
        const ad2Btn = document.getElementById('ad2Btn');
        const watchBtn = document.getElementById('watchBtn');
        const lockIcon = document.getElementById('lockIcon');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const statusMessage = document.getElementById('statusMessage');
        const watchBtnText = document.getElementById('watchBtnText');

        function clickAd(adNumber) {
            if (adNumber === 1 && !ad1Clicked) {
                ad1Clicked = true;
                window.open(adLink1, '_blank');
                updateAdButton(ad1Btn, 1);
            } else if (adNumber === 2 && !ad2Clicked) {
                ad2Clicked = true;
                window.open(adLink2, '_blank');
                updateAdButton(ad2Btn, 2);
            }
            updateProgress();
            checkUnlock();
        }

        function updateAdButton(button, adNum) {
            button.disabled = true;
            button.innerHTML = `
                <i class="fas fa-check-circle check-animation"></i>
                <span>✓ Opened</span>
            `;
        }

        function updateProgress() {
            const clickedCount = (ad1Clicked ? 1 : 0) + (ad2Clicked ? 1 : 0);
            const percentage = (clickedCount / 2) * 100;
            progressBar.style.width = percentage + '%';
            progressText.textContent = clickedCount;
        }

        function checkUnlock() {
            if (ad1Clicked && ad2Clicked) {
                // Unlock video button
                watchBtn.disabled = false;
                watchBtn.classList.add('active');
                watchBtnText.textContent = 'Open Drive Link - Unlocked!';
                
                // Update lock icon
                lockIcon.classList.remove('fa-lock');
                lockIcon.classList.add('fa-lock-open');
                lockIcon.classList.add('unlocked');
                
                // Update status message
                statusMessage.innerHTML = `
                    <p class="text-sm text-green-600 font-semibold flex items-center justify-center gap-2 fade-in">
                        <i class="fas fa-check-circle"></i>
                        <span>Drive link unlocked! Click to open</span>
                    </p>
                `;
            }
        }

        function watchVideo() {
            if (ad1Clicked && ad2Clicked) {
                // Add click animation
                watchBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    watchBtn.style.transform = 'scale(1)';
                    window.open(driveVideoLink, '_blank');
                }, 150);
            }
        }

        // Prevent double-clicking ads by checking visited state
        window.addEventListener('focus', () => {
            // Optional: Track when user returns from ad tab
        });
    </script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
